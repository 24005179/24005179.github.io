<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Mobile - Contact Us Page</title>
    <style>
        body {
            background-color: #2c2c2c;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }
        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #3CB371;
            padding: 10px 20px;
            width: 100%;
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo {
            margin-right: 20px;
        }
        .navbar {
            display: flex;
            list-style-type: none;
            margin: 0;
            padding: 0;
        }
        .navbar li {
            margin: 0 15px;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            padding: 14px 20px;
            display: block;
            border-radius: 5px;
            transition: background-color 0.3s ease;
            background-color: #2E8B57;
        }
        .navbar a:hover {
            background-color: #2E8B57;
        }
        .main-content {
            padding: 20px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
            max-width: 1200px;
        }
        .contact-us-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            background-color: #3CB371;
            padding: 20px;
            border-radius: 10px;
        }
        .contact-us-btn {
            background-color: #3CB371;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            width: 200px;
            margin-bottom: 20px;
        }
        .contact-us-btn:hover {
            background-color: #2E8B57;
        }
        .form-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 60%;
            max-width: 600px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            width: 100%;
            margin-bottom: 20px;
        }
        .form-group label {
            margin-bottom: 10px;
        }
        .form-group input,
        .form-group textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 100%;
        }
        .submit-btn {
            background-color: #3CB371;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            width: 100px;
        }
        .submit-btn:hover {
            background-color: #2E8B57;
        }
        footer {
            text-align: center;
            padding: 10px 0;
            background-color: #3CB371;
            color: black;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            margin-top: 20px;
            width: 100%;
            box-sizing: border-box;
        }
        .datetime-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .trademark {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background-color: rgba(60, 179, 113, 0.8);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8em;
            z-index: 1000;
        }
        .logo-container {
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: #3CB371;
            padding: 10px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            z-index: 1001;
        }

        .logo-container img {
            width: 50px;
            height: 50px;
            margin-right: 15px;
        }

        .logo-container h1 {
            margin: 0;
            color: white;
            font-size: 1.5em;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <div>
                <img src="assets\logo.jpg" alt="Simple Mobile Logo" class="logo" width="50" height="50">
                <h1 style="margin: 0; color: white;">Simple Mobile</h1>
            </div>
            <nav>
                <ul class="navbar">
                    <li><a href="home.html">Home</a></li>
                    <li><a href="shopping.html">Shopping</a></li>
                    <li><a href="basket.html">Basket</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <section class="main-content">
            <div class="contact-us-container">
                <button class="contact-us-btn">Contact Us</button>
                <div class="form-container">
                    <form>
                        <div class="form-group">
                            <label for="name">Enter Name:</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Enter Email:</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="query">Enter Query in this box:</label>
                            <textarea id="query" name="query" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="submit-btn">Submit</button>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2025 Simple Mobile Store. All rights reserved.</p>
    </footer>
    <script>
        const form = document.querySelector('form');
        form.addEventListener('submit', (event) => {
            event.preventDefault();
            alert('Your feedback has been submitted!');
        });
    </script>
</body>
</html>
