<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simply Mobiles Ltd</title>
    <style>
        body {
            background-color: #2c2c2c;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center; /* Center the navigation */
            background-color: #3CB371;
            padding: 10px 20px;
            width: 100%;
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 1000;
            margin-top: 100px; /* Add space for the floating logo bar */
        }
        .logo {
            margin-right: 20px;
        }
        .navbar {
            display: flex;
            list-style-type: none;
            margin: 0 auto; /* Center the navigation items */
            padding: 0;
        }
        .navbar li {
            margin: 0 15px;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            padding: 14px 20px;
            display: block;
            border-radius: 5px;
            transition: background-color 0.3s ease;
            background-color: #2E8B57;
        }
        .navbar a:hover {
            background-color: #2E8B57;
        }
        .main-content {
            padding: 20px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
            max-width: 1200px;
        }
        .welcome-message {
            background-color: #3CB371;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .image-container {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            flex-wrap: wrap;
            gap: 20px;
            padding: 0 20px;
        }
        .image-card {
            width: 45%;
            min-width: 400px;
            height: 400px;
            background-color: black;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin: 10px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .image-card:hover {
        transform: scale(1.10); /* Adds a subtle zoom effect on hover */
}
        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* This ensures the image covers the area without distortion */
            border-radius: 10px;
        }
        footer {
            text-align: center;
            padding: 10px 0;
            background-color: #3CB371;
            color: white;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            margin-top: 20px;
            width: 100%;
            box-sizing: border-box;
        }
        .datetime-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .trademark {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background-color: rgba(60, 179, 113, 0.8);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8em;
            z-index: 1000;
        }
        .logo-container {
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: #3CB371;
            padding: 10px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            z-index: 1001;
        }

        .logo-container img {
            width: 50px;
            height: 50px;
            margin-right: 15px;
        }

        .logo-container h1 {
            margin: 0;
            color: white;
            font-size: 1.5em;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="assets/logo.jpg" alt="Simply Mobiles Ltd Logo">
            <h1>Simply Mobiles Ltd</h1>
        </div>
        <div class="header-container">
            <nav>
                <ul class="navbar">
                    <li><a href="home.html">Home</a></li>
                    <li><a href="shopping.html">Shopping</a></li>
                    <li><a href="basket.html">Basket</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <section class="main-content">
            <div class="welcome-message">
                <h2>Welcome To Simply Mobiles Ltd</h2>
            </div>
            <div class="image-container">
                <div class="image-card">
                    <img src="assets/airpods.jpg" alt="Image of Earphones">
                </div>
                <div class="image-card">
                    <img src="assets/xiaomi.jpeg" alt="Image of phones">
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2025 Simply Mobiles Ltd. All rights reserved.</p>
    </footer>
    <div class="trademark">
        Simply Mobiles Ltd™
    </div>
    <script>
        function updateDateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const timeString = `${hours}:${minutes}:${seconds}`;
            document.getElementById('time').textContent = `Time: ${timeString}`;

            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0'); // Months are zero-based
            const year = now.getFullYear();
            const dateString = `${day}/${month}/${year}`;
            document.getElementById('date').textContent = `Date: ${dateString}`;
        }

        setInterval(updateDateTime, 1000);
        updateDateTime(); // Initial call to display date and time immediately
    </script>
</html>
