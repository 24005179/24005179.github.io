<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Mobile - Checkout Page</title>
    <style>
        body {
            background-color: #2c2c2c;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }
        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #3CB371;
            padding: 10px 20px;
            width: 100%;
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo {
            margin-right: 20px;
        }
        .navbar {
            display: flex;
            list-style-type: none;
            margin: 0;
            padding: 0;
        }
        .navbar li {
            margin: 0 15px;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            padding: 14px 20px;
            display: block;
            border-radius: 5px;
            transition: background-color 0.3s ease;
            background-color: #2E8B57;
        }
        .navbar a:hover {
            background-color: #2E8B57;
        }
        .main-content {
            padding: 20px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
            max-width: 1200px;
        }
        .checkout-container {
            display: flex;
            flex-direction: row; /* Changed from column to row */
            gap: 20px;
            background-color: #3CB371;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 1200px;
            margin: 20px auto;
            overflow-y: auto;
            max-height: calc(100vh - 200px);
        }
        .checkout-btn-container {
            width: 20%;
            height: 300px;
            background-color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .image-card {
            width: 45%;
            height: 300px;
            background-color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .success-message {
            width: 30%;
            height: 300px;
            background-color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .checkout-btn {
            background-color: #2E8B57;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1em;
            transition: background-color 0.3s ease;
            width: 100%;
            margin-top: 20px;
        }
        .checkout-btn:hover {
            background-color: #2E8B57;
            opacity: 0.9;
        }
        .order-summary {
            flex: 1;
            background-color: #2c2c2c;
            padding: 20px;
            border-radius: 8px;
            height: fit-content;
        }
        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #3CB371;
            color: white;
        }
        .order-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 5px;
            margin-right: 10px;
        }
        .total-section {
            margin-top: 20px;
            padding-top: 10px;
            border-top: 2px solid #3CB371;
            text-align: right;
            color: white;
            font-size: 1.2em;
        }
        .checkout-form {
            flex: 1;
            background-color: #2c2c2c;
            padding: 20px;
            border-radius: 8px;
            height: fit-content;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: white;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #3CB371;
            border-radius: 4px;
            background-color: white;
            color: #2c2c2c;
        }
        .checkout-container {
            display: flex;
            flex-direction: row; /* Changed from column to row */
            gap: 20px;
            background-color: #3CB371;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 1200px;
            margin: 20px auto;
            overflow-y: auto;
            max-height: calc(100vh - 200px);
        }

        .order-summary {
            flex: 1;
            background-color: #2c2c2c;
            padding: 20px;
            border-radius: 8px;
            height: fit-content;
        }

        .checkout-form {
            flex: 1;
            background-color: #2c2c2c;
            padding: 20px;
            border-radius: 8px;
            height: fit-content;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #3CB371;
            border-radius: 4px;
            background-color: white;
            color: #2c2c2c;
        }

        .checkout-btn {
            background-color: #2E8B57;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1em;
            transition: background-color 0.3s ease;
            width: 100%;
            margin-top: 20px;
        }

        .checkout-btn:hover {
            background-color: #2E8B57;
            opacity: 0.9;
        }

        footer {
            text-align: center;
            padding: 10px 0;
            background-color: #3CB371;
            color: white;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            margin-top: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        #checkout-items {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }
        .datetime-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .trademark {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background-color: rgba(60, 179, 113, 0.8);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8em;
            z-index: 1000;
        }
        .logo-container {
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: #3CB371;
            padding: 10px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            z-index: 1001;
        }

        .logo-container img {
            width: 50px;
            height: 50px;
            margin-right: 15px;
        }

        .logo-container h1 {
            margin: 0;
            color: white;
            font-size: 1.5em;
        }
    </style>
    </head>
    <body>
        <header>
            <div class="header-container">
                <div>
                    <img src="assets/logo.jpg" alt="Simple Mobile Logo" class="logo" width="50" height="50">
                    <h1 style="margin: 0; color: white;">Simple Mobile</h1>
                </div>
                <nav>
                    <ul class="navbar">
                        <li><a href="home.html">Home</a></li>
                        <li><a href="shopping.html">Shopping</a></li>
                        <li><a href="basket.html">Basket</a></li>
                        <li><a href="about.html">About Us</a></li>
                        <li><a href="contact.html">Contact Us</a></li>
                    </ul>
                </nav>
            </div>
        </header>
    
        <main>
            <section class="main-content">
                <h2>Checkout</h2>
                <div class="checkout-container">
                    <div class="order-summary">
                        <h3>Order Summary</h3>
                        <div id="checkout-items"></div>
                        <div class="total-section">
                            <strong>Total: £<span id="total-amount">0.00</span></strong>
                        </div>
                    </div>
    
                    <div class="checkout-form">
                        <h3>Shipping Information</h3>
                        <form id="shipping-form">
                            <div class="form-group">
                                <label for="fullname">Full Name</label>
                                <input type="text" id="fullname" required placeholder="John Doe">
                            </div>
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" id="email" required placeholder="john.doe@example.com">
                            </div>
                            <div class="form-group">
                                <label for="phone">Phone Number</label>
                                <input type="tel" id="phone" required placeholder="+44 7123 456789">
                            </div>
                            <div class="form-group">
                                <label for="address">Street Address</label>
                                <input type="text" id="address" required placeholder="123 Main Street">
                            </div>
                            <div class="form-group">
                                <label for="city">City</label>
                                <input type="text" id="city" required placeholder="London">
                            </div>
                            <div class="form-group">
                                <label for="postcode">Postcode</label>
                                <input type="text" id="postcode" required placeholder="SW1A 1AA">
                            </div>
                            <button type="submit" class="checkout-btn">Complete Order</button>
                        </form>
                    </div>
                </div>
            </section>
        </main>
    
        <footer>
            <p>&copy; 2025 Simple Mobile Store. All rights reserved.</p>
        </footer>
    
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const basketItems = JSON.parse(localStorage.getItem('basketItems')) || [];
                const checkoutItems = document.getElementById('checkout-items');
                const totalAmount = document.getElementById('total-amount');
                let total = 0;
                basketItems.forEach(item => {
                    const itemElement = document.createElement('div');
                    itemElement.className = 'order-item';
                    itemElement.innerHTML = `
                        <div>
                            <img src="${item.image}" alt="${item.name}">
                            ${item.name}
                        </div>
                        <div>£${item.price}</div>
                    `;
                    checkoutItems.appendChild(itemElement);
                    total += parseFloat(item.price);
                });
                totalAmount.textContent = total.toFixed(2);
            });
            document.getElementById('shipping-form').addEventListener('submit', (e) => {
                e.preventDefault();
                
                // Collect form data
                const formData = {
                    fullname: document.getElementById('fullname').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    address: document.getElementById('address').value,
                    city: document.getElementById('city').value,
                    postcode: document.getElementById('postcode').value
                };

                // Validate form data
                if (Object.values(formData).some(value => !value)) {
                    alert('Please fill in all fields');
                    return;
                }

                // Process the order
                alert('Order placed successfully! Thank you for your purchase.');
                localStorage.removeItem('basketItems');
                window.location.href = 'home.html';
            });
        </script>            
    </html>         total += parseFloat(item.price);cript>
       </script>            
    </html>
