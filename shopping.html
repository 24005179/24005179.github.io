<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Mobile - Shopping Page</title>
    <style>
        body {
            background-color: #2c2c2c;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }
        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #3CB371;
            padding: 10px 20px;
            width: 100%;
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo {
            margin-right: 20px;
        }
        .navbar {
            display: flex;
            list-style-type: none;
            margin: 0;
            padding: 0;
        }
        .navbar li {
            margin: 0 15px;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            padding: 14px 20px;
            display: block;
            border-radius: 5px;
            transition: background-color 0.3s ease;
            background-color: #2E8B57;
        }
        .navbar a:hover {
            background-color: #2E8B57;
        }
        .main-content {
            padding: 20px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
            max-width: 1200px;
        }
        .product-container {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            flex-wrap: wrap; /* Allow items to wrap to the next line on smaller screens */
        }
        .product-card {
            width: 32%; /* Increased width */
            min-width: 300px; /* Minimum width for better responsiveness */
            height: 400px; /* Increased height */
            background-color: #2E8B57;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin: 10px; /* Add some margin for spacing */
        }
        .product-card img {
            width: 80%;
            height: auto;
            border-radius: 10px;
        }
        .product-card h3 {
            margin: 0;
            color: white;
        }
        .add-to-basket-btn {
            background-color: #3CB371;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .add-to-basket-btn:hover {
            background-color: #2E8B57;
        }
        footer {
            text-align: center;
            padding: 10px 0;
            background-color: #3CB371;
            color: black;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            margin-top: 20px;
            width: 100%;
            box-sizing: border-box;
        }
        .checkout-container {
            margin-top: 30px;
            text-align: center;
        }

        .checkout-btn {
            background-color: #3CB371;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1.2em;
            cursor: pointer;
            transition: background-color 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .checkout-btn:hover {
            background-color: #2E8B57;
        }

        #itemCount {
            background-color: #2E8B57;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.9em;
        }
        .datetime-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .trademark {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background-color: rgba(60, 179, 113, 0.8);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8em;
            z-index: 1000;
        }
        .logo-container {
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: #3CB371;
            padding: 10px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            z-index: 1001;
        }

        .logo-container img {
            width: 50px;
            height: 50px;
            margin-right: 15px;
        }

        .logo-container h1 {
            margin: 0;
            color: white;
            font-size: 1.5em;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <div>
                <img src="assets\logo.jpg" alt="Simple Mobile Logo" class="logo" width="50" height="50">
                <h1 style="margin: 0; color: white;">Simple Mobile</h1>
            </div>
            <nav>
                <ul class="navbar">
                    <li><a href="home.html">Home</a></li>
                    <li><a href="shopping.html">Shopping</a></li>
                    <li><a href="basket.html">Basket</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <section class="main-content">
            <div class="product-container">
                <div class="product-card">
                    <img src="assets/airpods.jpg" alt="Image of Earphones">
                    <h3>Airpods</h3>
                    <p class="price">£199.99</p>
                    <button class="add-to-basket-btn">Add to Basket</button>
                </div>
                <div class="product-card">
                    <img src="assets/iphone.jpg" alt="Image of phones">
                    <h3>iPhone</h3>
                    <p class="price">£999.99</p>
                    <button class="add-to-basket-btn">Add to Basket</button>
                </div>
                <div class="product-card">
                    <img src="assets/xiaomi.jpeg" alt="Image of phones">
                    <h3>Xiaomi</h3>
                    <p class="price">£499.99</p>
                    <button class="add-to-basket-btn">Add to Basket</button>
                </div>
                <div class="product-card">
                    <img src="assets/buds.jpeg" alt="Image of phones">
                    <h3>Buds</h3>
                    <p class="price">£149.99</p>
                    <button class="add-to-basket-btn">Add to Basket</button>
                </div>
            </div>
            <div class="checkout-container">
                <button class="checkout-btn" onclick="goToCheckout()">
                    <span>Go to Checkout</span>
                    <span id="itemCount">(0 items)</span>
                </button>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2025 Simple Mobile Store. All rights reserved.</p>
    </footer>
    <script>
    const products = {
        'Airpods': { price: 199.99, image: 'assets/airpods.jpg' },
        'iPhone': { price: 999.99, image: 'assets/iphone.jpg' },
        'Xiaomi': { price: 499.99, image: 'assets/xiaomi.jpeg' },
        'Buds': { price: 149.99, image: 'assets/buds.jpeg' }
    };

    const addToBasketButtons = document.querySelectorAll('.add-to-basket-btn');
    
    addToBasketButtons.forEach(button => {
        button.addEventListener('click', () => {
            const productName = button.parentElement.querySelector('h3').textContent;
            const item = {
                name: productName,
                price: products[productName].price,
                image: products[productName].image
            };
            
            // Fix: Changed | to || for proper OR operator
            let basketItems = JSON.parse(localStorage.getItem('basketItems')) || [];
            basketItems.push(item);
            localStorage.setItem('basketItems', JSON.stringify(basketItems));
            alert(`${productName} added to basket!`);
            updateItemCount();
        });
    });

    function updateItemCount() {
        const basketItems = JSON.parse(localStorage.getItem('basketItems')) || [];
        const itemCount = document.getElementById('itemCount');
        itemCount.textContent = `(${basketItems.length} items)`;
    }

    function goToCheckout() {
        const basketItems = JSON.parse(localStorage.getItem('basketItems')) || [];
        if (basketItems.length === 0) {
            alert('Your basket is empty! Add some items before checking out.');
            return;
        }
        window.location.href = 'basket.html';
    }

    // Initialize item count when page loads
    document.addEventListener('DOMContentLoaded', () => {
        updateItemCount();
    });
    </script>
</body>
</html>
